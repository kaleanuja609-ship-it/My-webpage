<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anuja | BCA Scholar Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: linear-gradient(-45deg, #0f172a, #1e293b, #0c4a6e, #1e1b4b);
            --text-color: #f8fafc;
            --section-bg: rgba(30, 41, 59, 0.7);
            --accent: #38bdf8;
        }

        .light-mode {
            --bg-color: linear-gradient(-45deg, #f1f5f9, #e2e8f0, #cbd5e1, #94a3b8);
            --text-color: #0f172a;
            --section-bg: rgba(255, 255, 255, 0.8);
            --accent: #0284c7;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        html { scroll-behavior: smooth; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            background: var(--bg-color);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-color); 
            transition: 0.5s ease;
        }

        nav {
            background: rgba(15, 23, 42, 0.9);
            padding: 15px;
            position: sticky;
            top: 0;
            text-align: center;
            z-index: 1000;
            border-bottom: 2px solid var(--accent);
            backdrop-filter: blur(8px);
        }
        nav a { color: var(--accent); text-decoration: none; margin: 0 15px; font-weight: bold; font-size: 13px; }

        .theme-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            font-size: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 1001;
        }

        header { padding: 80px 20px; text-align: center; }
        h1 { font-size: 3.5rem; font-family: 'Dancing Script', cursive; color: var(--accent); }

        section { 
            padding: 35px 25px; 
            max-width: 800px; 
            margin: 30px auto; 
            background: var(--section-bg); 
            border-radius: 20px; 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Skill Bar Styles */
        .skill-container { margin: 15px 0; }
        .skill-label { display: flex; justify-content: space-between; margin-bottom: 5px; font-weight: bold; }
        .skill-bar { background: #334155; height: 10px; border-radius: 10px; overflow: hidden; }
        .skill-fill { background: var(--accent); height: 100%; border-radius: 10px; transition: 1s ease-in-out; }

        .qr-section { text-align: center; margin: 40px auto; }
        .qr-image { width: 150px; border: 4px solid var(--accent); border-radius: 15px; background: white; padding: 5px; }

        footer { text-align: center; padding: 40px; font-size: 13px; opacity: 0.8; }
    </style>
</head>
<body>

    <button class="theme-btn" onclick="toggleTheme()">🌓</button>

    <nav>
        <a href="#about">ABOUT</a>
        <a href="#skills">SKILLS</a>
        <a href="#education">EDUCATION</a>
    </nav>

    <header id="about">
        <h1>Anuja</h1>
        <p>BCA Scholar | 2nd Semester</p>
        <div id="clock" style="font-size: 20px; font-family: monospace;">00:00:00</div>
    </header>

    <section id="skills">
        <h2>Technical Proficiency</h2>
        
        <div class="skill-container">
            <div class="skill-label"><span>C Programming</span><span>85%</span></div>
            <div class="skill-bar"><div class="skill-fill" style="width: 85%;"></div></div>
        </div>

        <div class="skill-container">
            <div class="skill-label"><span>HTML & CSS</span><span>90%</span></div>
            <div class="skill-bar"><div class="skill-fill" style="width: 90%;"></div></div>
        </div>

        <div class="skill-container">
            <div class="skill-label"><span>Java Basics</span><span>70%</span></div>
            <div class="skill-bar"><div class="skill-fill" style="width: 70%;"></div></div>
        </div>
    </section>

    <section id="education">
        <h2>Education</h2>
        <p><strong>Maharashtra Mahavidyalaya</strong><br>BCA 1st Year (2nd Semester)</p>
    </section>

    <div class="qr-section">
        <p style="font-weight: bold; color: var(--accent);">MY QR CODE</p>
        <img src="qr-code.png.png" alt="QR Code" class="qr-image">
    </div>

    <footer>
        <p>&copy; 2026 Anuja | Made with ❤️ in Maharashtra</p>
    </footer>

    <script>
        function updateTime() {
            const now = new Date();
            document.getElementById('clock').innerHTML = now.toLocaleTimeString();
            setTimeout(updateTime, 1000);
        }
        updateTime();

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
        }
    </script>
</body>
</html>
