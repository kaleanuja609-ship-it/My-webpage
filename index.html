<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anuja | BCA Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            margin: 0; 
            background: linear-gradient(-45deg, #0f172a, #1e293b, #0c4a6e, #1e1b4b);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #f8fafc; 
            text-align: center;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        header { padding: 80px 20px; }
        h1 { font-size: 3rem; letter-spacing: 5px; text-shadow: 0 0 20px #38bdf8; margin: 0; }
        
        section { 
            padding: 30px; 
            max-width: 800px; 
            margin: 20px auto; 
            background: rgba(30, 41, 59, 0.7); 
            border-radius: 20px; 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(56, 189, 248, 0.2);
        }
        
        .qr-container { margin: 30px auto; }
        .qr-image { 
            width: 150px; 
            border: 3px solid #38bdf8; 
            border-radius: 15px; 
            padding: 10px; 
            background: white; 
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
        }

        .thank-you-text {
            font-family: 'Dancing Script', cursive;
            font-size: 40px;
            color: #38bdf8;
            margin-top: 20px;
        }
        footer { padding: 40px; color: #64748b; font-size: 12px; }
    </style>
</head>
<body>

    <header>
        <h1>ANUJA</h1>
        <p>BCA Student | Maharashtra Mahavidyalaya</p>
    </header>

    <section>
        <h2>My Journey</h2>
        <p>Currently studying in BCA 2nd Semester. Exploring the world of Coding and Cyber Security.</p>
    </section>

    <div class="qr-container">
        <p style="color: #38bdf8; font-size: 14px; margin-bottom: 10px;">Scan to see my work</p>
        <img src="qr-code.png" alt="Scan Me" class="qr-image">
    </div>

    <div class="thank-you-section">
        <p class="thank-you-text">Thank You for Visiting!</p>
    </div>

    <footer>
        <p>Built with ❤️ | &copy; 2026 Anuja</p>
    </footer>

</body>
</html>
