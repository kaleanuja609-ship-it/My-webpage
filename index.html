<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anuja's Portfolio ✨</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; background-color: #f8f9fa; color: #333; text-align: center; }
        header { background: #6c5ce7; color: white; padding: 50px 20px; }
        section { padding: 40px 20px; max-width: 700px; margin: auto; background: white; margin-top: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .btn { background: #fd79a8; color: white; border: none; padding: 12px 20px; border-radius: 25px; cursor: pointer; margin: 10px; font-weight: bold; transition: 0.3s; }
        .btn:hover { transform: scale(1.1); background: #e84393; }
        #msgBox { margin-top: 20px; padding: 15px; border-radius: 10px; background: #dfe6e9; display: none; font-weight: bold; color: #2d3436; }
        footer { margin-top: 50px; padding: 20px; font-size: 0.9rem; color: #636e72; }
    </style>
</head>
<body>

    <header>
        <h1>Anuja's Digital Space ✨</h1>
        <p>BCA Student | Maharashtra Mahavidyalaya</p>
    </header>

    <section>
        <h2>Interactive Buttons</h2>
        <p>बटन दबाएं और मैसेज देखें:</p>
        <button class="btn" onclick="show('Welcome to my first project! 😊')">Welcome</button>
        <button class="btn" onclick="show('BCA 2nd Semester: Let\'s crack it! 💻🚀')">My Goal</button>
        <button class="btn" style="background:#00cec9;" onclick="show('Keep coding and keep dancing! 💃✨')">Magic Mode</button>
        
        <div id="msgBox"></div>
    </section>

    <section>
        <h2>About My Skills</h2>
        <p>I am learning <b>C, Java, and Python</b>. Besides coding, I love <b>Dancing</b> 💃 and taking care of my <b>Roses</b> 🌹.</p>
    </section>

    <footer>
        <p>Created with ❤️ by Anuja | 2026</p>
    </footer>

    <script>
        function show(t) {
            let b = document.getElementById('msgBox');
            b.innerHTML = t;
            b.style.display = 'block';
        }
    </script>

</body>
</html>
